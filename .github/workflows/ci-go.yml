name: CI Go Services

on:
  push:
    branches: [ main ]
    paths:
      - 'arda-be-go/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'arda-be-go/**'

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            iam-service: 'arda-be-go/services/iam-service/**'
            crm-service: 'arda-be-go/services/crm-service/**'
            common-service: 'arda-be-go/services/common-service/**'

  build-and-push:
    needs: changes
    if: ${{ needs.changes.outputs.services != '[]' }}
    strategy:
      matrix:
        service: ${{ fromJson(needs.changes.outputs.services) }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        id: build
        run: |
          SERVICE_NAME=${{ matrix.service }}
          IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/$SERVICE_NAME
          TAG=${{ github.sha }}
          SHORT_TAG=${TAG:0:7}

          docker build -t $IMAGE_NAME:$SHORT_TAG -t $IMAGE_NAME:latest \
            -f arda-be-go/services/$SERVICE_NAME/Dockerfile arda-be-go/services/$SERVICE_NAME

          docker push $IMAGE_NAME:$SHORT_TAG
          docker push $IMAGE_NAME:latest

          echo "image_tag=$SHORT_TAG" >> $GITHUB_OUTPUT
          echo "image_name=$IMAGE_NAME" >> $GITHUB_OUTPUT

  deploy:
    needs: [changes, build-and-push]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service: ${{ fromJson(needs.changes.outputs.services) }}
    uses: ./.github/workflows/gitops-update.yml
    with:
      service_path: ${{ matrix.service }}
      image_name: ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}
      image_tag: ${{ needs.build-and-push.outputs.image_tag }} # Note: This needs careful handling for matrix
    secrets:
      GITOPS_PAT: ${{ secrets.GITOPS_PAT }}
