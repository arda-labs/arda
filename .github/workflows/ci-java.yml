name: CI Java Services

on:
  push:
    branches: [ main ]
    paths:
      - 'arda-be-java/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'arda-be-java/**'

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            accounting-service: 'arda-be-java/services/accounting/**'

  build-and-push:
    needs: changes
    if: ${{ needs.changes.outputs.services != '[]' }}
    strategy:
      matrix:
        service: ${{ fromJson(needs.changes.outputs.services) }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          SERVICE_NAME=${{ matrix.service }}
          IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/$SERVICE_NAME
          TAG=${{ github.sha }}
          SHORT_TAG=${TAG:0:7}

          # Giả định Dockerfile nằm ở arda-be-java/services/$SERVICE_NAME/Dockerfile
          docker build -t $IMAGE_NAME:$SHORT_TAG -t $IMAGE_NAME:latest \
            -f arda-be-java/services/$SERVICE_NAME/Dockerfile arda-be-java

          docker push $IMAGE_NAME:$SHORT_TAG
          docker push $IMAGE_NAME:latest

  deploy:
    needs: [changes, build-and-push]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service: ${{ fromJson(needs.changes.outputs.services) }}
    uses: ./.github/workflows/gitops-update.yml
    with:
      service_path: ${{ matrix.service }}
      image_name: ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}
      image_tag: ${{ github.sha }}
    secrets:
      GITOPS_PAT: ${{ secrets.GITOPS_PAT }}
