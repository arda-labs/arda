name: CI Angular MFE

on:
  push:
    branches: [ main ]
    paths:
      - 'arda-mfe/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'arda-mfe/**'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: arda-mfe/package-lock.json

      - name: Install dependencies
        run: cd arda-mfe && npm install

      - name: Derive appropriate SHAs for base and head for nx affected
        uses: nrwl/nx-set-shas@v4
        with:
          main-branch-name: 'main'

      - name: Get affected apps
        id: affected
        run: |
          cd arda-mfe
          APPS=$(npx nx show projects --affected --type app --json | jq -r '.[]' | tr '\n' ',' | sed 's/,$//')
          echo "apps=$APPS" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        if: steps.affected.outputs.apps != ''
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITOPS_PAT }}

      - name: Build and Push Docker Images
        if: steps.affected.outputs.apps != ''
        run: |
          IFS=',' read -ra ADDR <<< "${{ steps.affected.outputs.apps }}"
          TAG=${{ github.sha }}
          SHORT_TAG=${TAG:0:7}

          for app in "${ADDR[@]}"; do
            IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/mfe-$app

            # Giả định Dockerfile nằm ở arda-mfe/apps/$app/Dockerfile
            docker build -t $IMAGE_NAME:$SHORT_TAG -t $IMAGE_NAME:latest \
              --build-arg PROJECT=$app \
              -f arda-mfe/Dockerfile arda-mfe

            docker push $IMAGE_NAME:$SHORT_TAG
            docker push $IMAGE_NAME:latest
          done

  deploy:
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.build-and-push.outputs.apps != ''
    strategy:
      matrix:
        app: ${{ fromJson(needs.build-and-push.outputs.apps_json) }} # Cần tối ưu lại logic output json
    uses: ./.github/workflows/gitops-update.yml
    with:
      service_path: mfe-${{ matrix.app }}
      image_name: ghcr.io/${{ github.repository_owner }}/mfe-${{ matrix.app }}
      image_tag: ${{ github.sha }} # Dùng sha làm tag cho đồng bộ
    secrets:
      GITOPS_PAT: ${{ secrets.GITOPS_PAT }}
