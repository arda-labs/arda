name: CI Angular MFE

on:
  push:
    branches: [main]
    paths:
      - "apps/frontend-micro/**"
      - ".github/workflows/ci-mfe.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/frontend-micro/**"
      - ".github/workflows/ci-mfe.yml"
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      short_sha: ${{ steps.vars.outputs.short_sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set variables
        id: vars
        run: echo "short_sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/frontend-micro/package-lock.json

      - name: Install dependencies
        run: cd apps/frontend-micro && npm install

      - name: Get affected apps
        id: affected
        run: |
          cd apps/frontend-micro

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "Manual trigger: building all apps"
            APPS="shell,iam,common"
          else
            # Get changes between previous commit and current
            if [[ "${{ github.event_name }}" == "pull_request" ]]; then
              BASE_SHA=${{ github.event.pull_request.base.sha }}
            else
              BASE_SHA=${{ github.event.before }}
              # Handle force pushes or first commits where before is 000000
              if [[ "$BASE_SHA" == "0000000000000000000000000000000000000000" ]]; then
                BASE_SHA="HEAD^"
              fi
            fi
            
            # Fetch base sha if necessary
            git fetch origin $BASE_SHA || true
            CHANGED_FILES=$(git diff --name-only $BASE_SHA ${{ github.sha }} || echo "all")
            
            echo "Changed files:"
            echo "$CHANGED_FILES"
            
            # Smart detection logic
            AFFECTED=()
            
            # If global config, root files, or core lib changed -> rebuild ALL
            if echo "$CHANGED_FILES" | grep -E -q "package\.json|angular\.json|federation\.config\.js|Dockerfile|nginx\.conf|projects/core"; then
              AFFECTED=("shell" "iam" "common")
            else
              if echo "$CHANGED_FILES" | grep -q "projects/shell"; then
                AFFECTED+=("shell")
              fi
              if echo "$CHANGED_FILES" | grep -q "projects/iam"; then
                AFFECTED+=("iam")
              fi
              if echo "$CHANGED_FILES" | grep -q "projects/common"; then
                AFFECTED+=("common")
              fi
            fi
            
            APPS=$(IFS=, ; echo "${AFFECTED[*]}")
          fi

          echo "Affected apps: $APPS"
          echo "apps=$APPS" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        if: steps.affected.outputs.apps != ''
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITOPS_PAT }}

      - name: Build and Push Docker Images
        if: steps.affected.outputs.apps != ''
        run: |
          IFS=',' read -ra ADDR <<< "${{ steps.affected.outputs.apps }}"
          TAG=${{ github.sha }}
          SHORT_TAG=${TAG:0:7}

          for app in "${ADDR[@]}"; do
            IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/mfe-$app

            # Build from root context to include shared assets if any
            docker build -t $IMAGE_NAME:$SHORT_TAG -t $IMAGE_NAME:latest \
              --target mfe-${app}-runtime \
              --build-arg PROJECT=$app \
              -f apps/frontend-micro/Dockerfile apps/frontend-micro

            docker push $IMAGE_NAME:$SHORT_TAG
            docker push $IMAGE_NAME:latest
          done
      - name: Create matrix
        id: set-matrix
        run: |
          # Chuyển chuỗi "shell,common" thành JSON array ["mfe-shell", "mfe-common"]
          IFS=',' read -ra ADDR <<< "${{ steps.affected.outputs.apps }}"
          JSON="["
          for i in "${!ADDR[@]}"; do
            JSON+="\"mfe-${ADDR[$i]}\""
            if [ $i -lt $((${#ADDR[@]} - 1)) ]; then JSON+=","; fi
          done
          JSON+="]"
          echo "matrix=$JSON" >> $GITHUB_OUTPUT

  deploy:
    needs: build-and-push
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && needs.build-and-push.outputs.matrix != '[]'
    strategy:
      matrix:
        service: ${{ fromJson(needs.build-and-push.outputs.matrix) }}
    uses: ./.github/workflows/gitops-update.yml
    with:
      service_path: ${{ matrix.service }}
      image_name: ghcr.io/${{ github.repository_owner }}/${{ matrix.service }}
      image_tag: ${{ needs.build-and-push.outputs.short_sha }}
    secrets:
      GITOPS_PAT: ${{ secrets.GITOPS_PAT }}
