name: CI Angular MFE

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/frontend/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'apps/frontend/**'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install dependencies
        run: cd apps/frontend && npm install

      - name: Derive appropriate SHAs for base and head for nx affected
        uses: nrwl/nx-set-shas@v4
        with:
          main-branch-name: 'main'

      - name: Get affected apps
        id: affected
        run: |
          cd apps/frontend
          APPS=$(npx nx show projects --affected --type app --json | jq -r '.[]' | tr '\n' ',' | sed 's/,$//')
          echo "apps=$APPS" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        if: steps.affected.outputs.apps != ''
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITOPS_PAT }}

      - name: Build and Push Docker Images
        if: steps.affected.outputs.apps != ''
        run: |
          IFS=',' read -ra ADDR <<< "${{ steps.affected.outputs.apps }}"
          TAG=${{ github.sha }}
          SHORT_TAG=${TAG:0:7}

          for app in "${ADDR[@]}"; do
            IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/mfe-$app

            # Build from root context to include shared assets if any
            docker build -t $IMAGE_NAME:$SHORT_TAG -t $IMAGE_NAME:latest \
              --build-arg PROJECT=$app \
              -f apps/frontend/Dockerfile apps/frontend

            docker push $IMAGE_NAME:$SHORT_TAG
            docker push $IMAGE_NAME:latest
          done
