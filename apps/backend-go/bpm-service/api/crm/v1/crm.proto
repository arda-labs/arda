syntax = "proto3";

package api.crm.v1;

option go_package = "github.com/arda-labs/arda/arda-be-go/services/bpm-service/api/crm/v1;v1";

service CRM {
  rpc FinalizeCustomer (FinalizeCustomerRequest) returns (FinalizeCustomerReply);
}

message FinalizeCustomerRequest {
  string customer_id = 1;
  string status = 2;
}

message FinalizeCustomerReply {
  bool success = 1;
  string message = 2;
}
