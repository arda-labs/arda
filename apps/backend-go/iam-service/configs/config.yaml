server:
  http:
    addr: 0.0.0.0:8000
    timeout: 10s
  grpc:
    addr: 0.0.0.0:9000
    timeout: 10s

data:
  database:
    driver: postgres
    source: "postgres://iam:iam%40123@thinkcenter:5432/iam?sslmode=disable"
  redis:
    addr: "thinkcenter:6379"
    read_timeout: 0.2s
    write_timeout: 0.2s
    db: 0

jwt:
  jwks_endpoint: "https://arda.io.vn/oauth/v2/keys"
  issuer: "https://arda.io.vn"
  audience: "370596460112183382"

zitadel:
  authority: "https://auth.arda.io.vn"
  pat: "${ZITADEL_LOGIN_CLIENT_PAT}"
