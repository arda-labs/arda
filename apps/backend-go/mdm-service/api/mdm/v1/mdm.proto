    option (google.api.http) = { get: "/v1/mdm/provinces" };
  }
  rpc ListWards(ListWardsRequest) returns (ListAdministrativeUnitsResponse) {
    option (google.api.http) = { get: "/v1/mdm/provinces/{province_id}/wards" };
  }
  rpc GetAdministrativeUnit(GetAdministrativeUnitRequest) returns (AdministrativeUnit) {
    option (google.api.http) = { get: "/v1/mdm/administrative-units/{id}" };
  }
  rpc CreateAdministrativeUnit(CreateAdministrativeUnitRequest) returns (AdministrativeUnit) {
    option (google.api.http) = { post: "/v1/mdm/administrative-units" body: "*" };
