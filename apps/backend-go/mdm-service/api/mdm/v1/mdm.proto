    option (google.api.http) = { get: "/v1/mdm/business-calendars/{id}" };
  }
  rpc CreateBusinessCalendar(CreateBusinessCalendarRequest) returns (BusinessCalendar) {
    option (google.api.http) = { post: "/v1/mdm/business-calendars" body: "*" };
  }
  rpc UpdateBusinessCalendar(UpdateBusinessCalendarRequest) returns (BusinessCalendar) {
    option (google.api.http) = { put: "/v1/mdm/business-calendars/{id}" body: "*" };
  }
