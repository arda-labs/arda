message AdministrativeUnit {
  string id = 1;
  string code = 2;
  string name = 3;
  string full_name = 4;
  string short_name = 5;
  string level = 6;
  string unit_type = 7;
  string parent_id = 8;
  string path = 9;
  int32 sort_order = 10;
  double latitude = 11;
  double longitude = 12;
  string status = 13;
  string effective_from = 14;
  string effective_to = 15;
  string source = 16;
  string metadata_json = 17;
  google.protobuf.Timestamp created_at = 18;
  google.protobuf.Timestamp updated_at = 19;
}

message AdministrativeUnitNode {
  AdministrativeUnit unit = 1;
  repeated AdministrativeUnitNode children = 2;
}

message AreaType {
  string id = 1;
  string code = 2;
  string name = 3;
  string description = 4;
  bool allow_hierarchy = 5;
  string status = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
}

message Area {
  string id = 1;
  string area_type_id = 2;
  string area_type_code = 3;
  string parent_id = 4;
  string code = 5;
  string name = 6;
  string description = 7;
  string manager_user_id = 8;
  string status = 9;
  string effective_from = 10;
  string effective_to = 11;
  string metadata_json = 12;
  google.protobuf.Timestamp created_at = 13;
  google.protobuf.Timestamp updated_at = 14;
}

message AreaNode {
  Area area = 1;
  repeated AreaNode children = 2;
}

message AreaAdministrativeUnit {
  string id = 1;
  string area_id = 2;
  string administrative_unit_id = 3;
  string scope_type = 4;
  google.protobuf.Timestamp created_at = 5;
}

message CodeSet {
  string id = 1;
  string code = 2;
  string name = 3;
  string description = 4;
  bool is_system = 5;
  string status = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
}

message CodeItem {
  string id = 1;
  string code_set_id = 2;
  string code_set_code = 3;
  string code = 4;
  string name = 5;
  string value = 6;
  string parent_id = 7;
  int32 sort_order = 8;
  string color = 9;
  string icon = 10;
  string metadata_json = 11;
  bool is_default = 12;
  bool is_system = 13;
  string status = 14;
  string effective_from = 15;
  string effective_to = 16;
  google.protobuf.Timestamp created_at = 17;
  google.protobuf.Timestamp updated_at = 18;
}

message SystemParameter {
  string id = 1;
  string key = 2;
  string name = 3;
  string group_code = 4;
  string value_type = 5;
  string value_text = 6;
  double value_number = 7;
  bool value_boolean = 8;
  string value_json = 9;
  string default_value = 10;
  bool is_secret = 11;
  bool is_editable = 12;
  bool is_system = 13;
  string validation_rule_json = 14;
  string description = 15;
  string status = 16;
  string updated_by = 17;
  google.protobuf.Timestamp created_at = 18;
  google.protobuf.Timestamp updated_at = 19;
}

message CreditInstitution {
  string id = 1;
  string code = 2;
  string name = 3;
  string short_name = 4;
  string address = 5;
  string phone = 6;
  string email = 7;
  string license_number = 8;
  string issued_date = 9;
  string tax_code = 10;
  string website = 11;
  string note = 12;
  string status = 13;
  google.protobuf.Timestamp created_at = 14;
  google.protobuf.Timestamp updated_at = 15;
}

message BusinessCalendar {
  string id = 1;
  string code = 2;
  string name = 3;
  string timezone = 4;
  string calendar_type = 5;
  string description = 6;
  string status = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
}

message WorkingHour {
  string id = 1;
  string calendar_id = 2;
  int32 day_of_week = 3;
  bool is_working_day = 4;
  string start_time = 5;
  string end_time = 6;
  string cutoff_time = 7;
  string session_name = 8;
  int32 sort_order = 9;
  google.protobuf.Timestamp created_at = 10;
  google.protobuf.Timestamp updated_at = 11;
}

message CalendarException {
  string id = 1;
  string calendar_id = 2;
  string date = 3;
  string exception_type = 4;
  string name = 5;
  bool is_working_day = 6;
  string start_time = 7;
  string end_time = 8;
  string cutoff_time = 9;
  string source = 10;
  string note = 11;
  google.protobuf.Timestamp created_at = 12;
  google.protobuf.Timestamp updated_at = 13;
}

message FeeSchedule {
  string id = 1;
  string code = 2;
  string name = 3;
  string fee_type = 4;
  string calculation_method = 5;
  string currency = 6;
  double fixed_amount = 7;
  double rate_percent = 8;
  double min_amount = 9;
  double max_amount = 10;
  string channel = 11;
  string product_code = 12;
  string effective_from = 13;
  string effective_to = 14;
  string description = 15;
  string status = 16;
  string approval_status = 17;
  int32 version = 18;
  string approved_by = 19;
  google.protobuf.Timestamp approved_at = 20;
  string change_note = 21;
  google.protobuf.Timestamp created_at = 22;
  google.protobuf.Timestamp updated_at = 23;
}

message TaxRule {
  string id = 1;
  string code = 2;
  string name = 3;
  string tax_type = 4;
  double rate_percent = 5;
  bool inclusive = 6;
  string jurisdiction = 7;
  string effective_from = 8;
  string effective_to = 9;
  string description = 10;
  string status = 11;
  string approval_status = 12;
  int32 version = 13;
  string approved_by = 14;
  google.protobuf.Timestamp approved_at = 15;
  string change_note = 16;
  google.protobuf.Timestamp created_at = 17;
  google.protobuf.Timestamp updated_at = 18;
}

message StandardLimit {
  string id = 1;
  string code = 2;
  string name = 3;
  string limit_type = 4;
  string subject_type = 5;
  string currency = 6;
  double min_amount = 7;
  double per_txn_amount = 8;
  double daily_amount = 9;
  double monthly_amount = 10;
  int32 count_limit = 11;
  string channel = 12;
  string product_code = 13;
  string effective_from = 14;
  string effective_to = 15;
  string description = 16;
  string status = 17;
  string approval_status = 18;
  int32 version = 19;
  string approved_by = 20;
  google.protobuf.Timestamp approved_at = 21;
  string change_note = 22;
  google.protobuf.Timestamp created_at = 23;
  google.protobuf.Timestamp updated_at = 24;
}

