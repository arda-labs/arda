    option (google.api.http) = { get: "/v1/mdm/areas/{id}" };
  }
  rpc CreateArea(CreateAreaRequest) returns (Area) {
    option (google.api.http) = { post: "/v1/mdm/areas" body: "*" };
  }
  rpc UpdateArea(UpdateAreaRequest) returns (Area) {
    option (google.api.http) = { put: "/v1/mdm/areas/{id}" body: "*" };
  }
  rpc DeleteArea(DeleteAreaRequest) returns (DeleteResponse) {
    option (google.api.http) = { delete: "/v1/mdm/areas/{id}" };
  }
  rpc AssignAreaAdministrativeUnit(AssignAreaAdministrativeUnitRequest) returns (AreaAdministrativeUnit) {
    option (google.api.http) = { post: "/v1/mdm/areas/{area_id}/administrative-units" body: "*" };
  }
  rpc ListAreaAdministrativeUnits(ListAreaAdministrativeUnitsRequest) returns (ListAreaAdministrativeUnitsResponse) {
    option (google.api.http) = { get: "/v1/mdm/areas/{area_id}/administrative-units" };
  }
  rpc RemoveAreaAdministrativeUnit(RemoveAreaAdministrativeUnitRequest) returns (DeleteResponse) {
    option (google.api.http) = { delete: "/v1/mdm/areas/{area_id}/administrative-units/{administrative_unit_id}" };
  }

  rpc ListCodeSets(ListCodeSetsRequest) returns (ListCodeSetsResponse) {
    option (google.api.http) = { get: "/v1/mdm/code-sets" };
  }
  rpc GetCodeSet(GetCodeSetRequest) returns (CodeSet) {
    option (google.api.http) = { get: "/v1/mdm/code-sets/{id}" };
  }
  rpc CreateCodeSet(CreateCodeSetRequest) returns (CodeSet) {
    option (google.api.http) = { post: "/v1/mdm/code-sets" body: "*" };
  }
  rpc UpdateCodeSet(UpdateCodeSetRequest) returns (CodeSet) {
    option (google.api.http) = { put: "/v1/mdm/code-sets/{id}" body: "*" };
  }
  rpc DeleteCodeSet(DeleteCodeSetRequest) returns (DeleteResponse) {
    option (google.api.http) = { delete: "/v1/mdm/code-sets/{id}" };
