  }
  rpc CreateWorkingHour(CreateWorkingHourRequest) returns (WorkingHour) {
    option (google.api.http) = { post: "/v1/mdm/business-calendars/{calendar_id}/working-hours" body: "*" };
  }
  rpc UpdateWorkingHour(UpdateWorkingHourRequest) returns (WorkingHour) {
    option (google.api.http) = { put: "/v1/mdm/working-hours/{id}" body: "*" };
  }
  rpc DeleteWorkingHour(DeleteWorkingHourRequest) returns (DeleteResponse) {
    option (google.api.http) = { delete: "/v1/mdm/working-hours/{id}" };
  }
  rpc ListCalendarExceptions(ListCalendarExceptionsRequest) returns (ListCalendarExceptionsResponse) {
    option (google.api.http) = { get: "/v1/mdm/business-calendars/{calendar_id}/exceptions" };
  }
  rpc CreateCalendarException(CreateCalendarExceptionRequest) returns (CalendarException) {
    option (google.api.http) = { post: "/v1/mdm/business-calendars/{calendar_id}/exceptions" body: "*" };
  }
  rpc UpdateCalendarException(UpdateCalendarExceptionRequest) returns (CalendarException) {
    option (google.api.http) = { put: "/v1/mdm/calendar-exceptions/{id}" body: "*" };
  }
  rpc DeleteCalendarException(DeleteCalendarExceptionRequest) returns (DeleteResponse) {
    option (google.api.http) = { delete: "/v1/mdm/calendar-exceptions/{id}" };
  }
  rpc CalculateBusinessDay(CalculateBusinessDayRequest) returns (CalculateBusinessDayResponse) {
