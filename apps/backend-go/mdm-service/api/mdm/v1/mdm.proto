syntax = "proto3";

package mdm.v1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/arda-labs/arda/arda-be-go/services/mdm-service/api/mdm/v1;v1";

service MdmService {
  rpc ListAdministrativeUnits(ListAdministrativeUnitsRequest) returns (ListAdministrativeUnitsResponse) {
    option (google.api.http) = { get: "/v1/mdm/administrative-units" };
  }
  rpc ListAdministrativeUnitTree(ListAdministrativeUnitsRequest) returns (ListAdministrativeUnitTreeResponse) {
    option (google.api.http) = { get: "/v1/mdm/administrative-units/tree" };
  }
  rpc ListProvinces(ListAdministrativeUnitsRequest) returns (ListAdministrativeUnitsResponse) {
    option (google.api.http) = { get: "/v1/mdm/provinces" };
  }
  rpc ListWards(ListWardsRequest) returns (ListAdministrativeUnitsResponse) {
    option (google.api.http) = { get: "/v1/mdm/provinces/{province_id}/wards" };
  }
  rpc GetAdministrativeUnit(GetAdministrativeUnitRequest) returns (AdministrativeUnit) {
    option (google.api.http) = { get: "/v1/mdm/administrative-units/{id}" };
  }
  rpc CreateAdministrativeUnit(CreateAdministrativeUnitRequest) returns (AdministrativeUnit) {
    option (google.api.http) = { post: "/v1/mdm/administrative-units" body: "*" };
  }
  rpc UpdateAdministrativeUnit(UpdateAdministrativeUnitRequest) returns (AdministrativeUnit) {
    option (google.api.http) = { put: "/v1/mdm/administrative-units/{id}" body: "*" };
  }
  rpc DeleteAdministrativeUnit(DeleteAdministrativeUnitRequest) returns (DeleteResponse) {
    option (google.api.http) = { delete: "/v1/mdm/administrative-units/{id}" };
  }
  rpc SyncAdministrativeUnitsFromAddressKit(SyncAdministrativeUnitsFromAddressKitRequest) returns (SyncAdministrativeUnitsFromAddressKitResponse) {
    option (google.api.http) = { post: "/v1/mdm/administrative-units/sync-addresskit" body: "*" };
  }

  rpc ListAreaTypes(ListAreaTypesRequest) returns (ListAreaTypesResponse) {
    option (google.api.http) = { get: "/v1/mdm/area-types" };
  }
  rpc GetAreaType(GetAreaTypeRequest) returns (AreaType) {
    option (google.api.http) = { get: "/v1/mdm/area-types/{id}" };
  }
  rpc CreateAreaType(CreateAreaTypeRequest) returns (AreaType) {
    option (google.api.http) = { post: "/v1/mdm/area-types" body: "*" };
  }
  rpc UpdateAreaType(UpdateAreaTypeRequest) returns (AreaType) {
    option (google.api.http) = { put: "/v1/mdm/area-types/{id}" body: "*" };
  }
  rpc DeleteAreaType(DeleteAreaTypeRequest) returns (DeleteResponse) {
    option (google.api.http) = { delete: "/v1/mdm/area-types/{id}" };
  }

  rpc ListAreas(ListAreasRequest) returns (ListAreasResponse) {
    option (google.api.http) = { get: "/v1/mdm/areas" };
  }
  rpc ListAreaTree(ListAreasRequest) returns (ListAreaTreeResponse) {
    option (google.api.http) = { get: "/v1/mdm/areas/tree" };
  }
  rpc GetArea(GetAreaRequest) returns (Area) {
    option (google.api.http) = { get: "/v1/mdm/areas/{id}" };
  }
  rpc CreateArea(CreateAreaRequest) returns (Area) {
    option (google.api.http) = { post: "/v1/mdm/areas" body: "*" };
  }
  rpc UpdateArea(UpdateAreaRequest) returns (Area) {
    option (google.api.http) = { put: "/v1/mdm/areas/{id}" body: "*" };
  }
  rpc DeleteArea(DeleteAreaRequest) returns (DeleteResponse) {
    option (google.api.http) = { delete: "/v1/mdm/areas/{id}" };
  }
  rpc AssignAreaAdministrativeUnit(AssignAreaAdministrativeUnitRequest) returns (AreaAdministrativeUnit) {
    option (google.api.http) = { post: "/v1/mdm/areas/{area_id}/administrative-units" body: "*" };
  }
  rpc ListAreaAdministrativeUnits(ListAreaAdministrativeUnitsRequest) returns (ListAreaAdministrativeUnitsResponse) {
    option (google.api.http) = { get: "/v1/mdm/areas/{area_id}/administrative-units" };
  }
  rpc RemoveAreaAdministrativeUnit(RemoveAreaAdministrativeUnitRequest) returns (DeleteResponse) {
    option (google.api.http) = { delete: "/v1/mdm/areas/{area_id}/administrative-units/{administrative_unit_id}" };
  }

  rpc ListCodeSets(ListCodeSetsRequest) returns (ListCodeSetsResponse) {
    option (google.api.http) = { get: "/v1/mdm/code-sets" };
  }
  rpc GetCodeSet(GetCodeSetRequest) returns (CodeSet) {
    option (google.api.http) = { get: "/v1/mdm/code-sets/{id}" };
  }
  rpc CreateCodeSet(CreateCodeSetRequest) returns (CodeSet) {
    option (google.api.http) = { post: "/v1/mdm/code-sets" body: "*" };
  }
  rpc UpdateCodeSet(UpdateCodeSetRequest) returns (CodeSet) {
    option (google.api.http) = { put: "/v1/mdm/code-sets/{id}" body: "*" };
  }
  rpc DeleteCodeSet(DeleteCodeSetRequest) returns (DeleteResponse) {
    option (google.api.http) = { delete: "/v1/mdm/code-sets/{id}" };
  }
  rpc ListCodeItems(ListCodeItemsRequest) returns (ListCodeItemsResponse) {
    option (google.api.http) = { get: "/v1/mdm/code-sets/{code_set_code}/items" };
  }
  rpc GetCodeItem(GetCodeItemRequest) returns (CodeItem) {
    option (google.api.http) = { get: "/v1/mdm/code-items/{id}" };
  }
  rpc CreateCodeItem(CreateCodeItemRequest) returns (CodeItem) {
    option (google.api.http) = { post: "/v1/mdm/code-sets/{code_set_code}/items" body: "*" };
  }
  rpc UpdateCodeItem(UpdateCodeItemRequest) returns (CodeItem) {
    option (google.api.http) = { put: "/v1/mdm/code-items/{id}" body: "*" };
  }
  rpc DeleteCodeItem(DeleteCodeItemRequest) returns (DeleteResponse) {
    option (google.api.http) = { delete: "/v1/mdm/code-items/{id}" };
  }

  rpc ListSystemParameters(ListSystemParametersRequest) returns (ListSystemParametersResponse) {
    option (google.api.http) = { get: "/v1/mdm/system-parameters" };
  }
  rpc GetSystemParameter(GetSystemParameterRequest) returns (SystemParameter) {
    option (google.api.http) = { get: "/v1/mdm/system-parameters/{key}" };
  }
  rpc CreateSystemParameter(CreateSystemParameterRequest) returns (SystemParameter) {
    option (google.api.http) = { post: "/v1/mdm/system-parameters" body: "*" };
  }
  rpc UpdateSystemParameter(UpdateSystemParameterRequest) returns (SystemParameter) {
    option (google.api.http) = { put: "/v1/mdm/system-parameters/{key}" body: "*" };
  }
  rpc DeleteSystemParameter(DeleteSystemParameterRequest) returns (DeleteResponse) {
    option (google.api.http) = { delete: "/v1/mdm/system-parameters/{key}" };
  }

  rpc ListCreditInstitutions(ListCreditInstitutionsRequest) returns (ListCreditInstitutionsResponse) {
    option (google.api.http) = { get: "/v1/mdm/credit-institutions" };
  }
  rpc GetCreditInstitution(GetCreditInstitutionRequest) returns (CreditInstitution) {
    option (google.api.http) = { get: "/v1/mdm/credit-institutions/{id}" };
  }
  rpc CreateCreditInstitution(CreateCreditInstitutionRequest) returns (CreditInstitution) {
    option (google.api.http) = { post: "/v1/mdm/credit-institutions" body: "*" };
  }
  rpc UpdateCreditInstitution(UpdateCreditInstitutionRequest) returns (CreditInstitution) {
    option (google.api.http) = { put: "/v1/mdm/credit-institutions/{id}" body: "*" };
  }
  rpc DeleteCreditInstitution(DeleteCreditInstitutionRequest) returns (DeleteResponse) {
    option (google.api.http) = { delete: "/v1/mdm/credit-institutions/{id}" };
  }
}

message AdministrativeUnit {
  string id = 1;
  string code = 2;
  string name = 3;
  string full_name = 4;
  string short_name = 5;
  string level = 6;
  string unit_type = 7;
  string parent_id = 8;
  string path = 9;
  int32 sort_order = 10;
  double latitude = 11;
  double longitude = 12;
  string status = 13;
  string effective_from = 14;
  string effective_to = 15;
  string source = 16;
  string metadata_json = 17;
  google.protobuf.Timestamp created_at = 18;
  google.protobuf.Timestamp updated_at = 19;
}

message AdministrativeUnitNode {
  AdministrativeUnit unit = 1;
  repeated AdministrativeUnitNode children = 2;
}

message AreaType {
  string id = 1;
  string code = 2;
  string name = 3;
  string description = 4;
  bool allow_hierarchy = 5;
  string status = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
}

message Area {
  string id = 1;
  string area_type_id = 2;
  string area_type_code = 3;
  string parent_id = 4;
  string code = 5;
  string name = 6;
  string description = 7;
  string manager_user_id = 8;
  string status = 9;
  string effective_from = 10;
  string effective_to = 11;
  string metadata_json = 12;
  google.protobuf.Timestamp created_at = 13;
  google.protobuf.Timestamp updated_at = 14;
}

message AreaNode {
  Area area = 1;
  repeated AreaNode children = 2;
}

message AreaAdministrativeUnit {
  string id = 1;
  string area_id = 2;
  string administrative_unit_id = 3;
  string scope_type = 4;
  google.protobuf.Timestamp created_at = 5;
}

message CodeSet {
  string id = 1;
  string code = 2;
  string name = 3;
  string description = 4;
  bool is_system = 5;
  string status = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
}

message CodeItem {
  string id = 1;
  string code_set_id = 2;
  string code_set_code = 3;
  string code = 4;
  string name = 5;
  string value = 6;
  string parent_id = 7;
  int32 sort_order = 8;
  string color = 9;
  string icon = 10;
  string metadata_json = 11;
  bool is_default = 12;
  bool is_system = 13;
  string status = 14;
  string effective_from = 15;
  string effective_to = 16;
  google.protobuf.Timestamp created_at = 17;
  google.protobuf.Timestamp updated_at = 18;
}

message SystemParameter {
  string id = 1;
  string key = 2;
  string name = 3;
  string group_code = 4;
  string value_type = 5;
  string value_text = 6;
  double value_number = 7;
  bool value_boolean = 8;
  string value_json = 9;
  string default_value = 10;
  bool is_secret = 11;
  bool is_editable = 12;
  bool is_system = 13;
  string validation_rule_json = 14;
  string description = 15;
  string status = 16;
  string updated_by = 17;
  google.protobuf.Timestamp created_at = 18;
  google.protobuf.Timestamp updated_at = 19;
}

message CreditInstitution {
  string id = 1;
  string code = 2;
  string name = 3;
  string short_name = 4;
  string address = 5;
  string phone = 6;
  string email = 7;
  string license_number = 8;
  string issued_date = 9;
  string tax_code = 10;
  string website = 11;
  string note = 12;
  string status = 13;
  google.protobuf.Timestamp created_at = 14;
  google.protobuf.Timestamp updated_at = 15;
}

message DeleteResponse {}

message SyncAdministrativeUnitsFromAddressKitRequest {}

message SyncAdministrativeUnitsFromAddressKitResponse {
  int32 province_count = 1;
  int32 ward_count = 2;
  string effective_date = 3;
  string source = 4;
}

message ListAdministrativeUnitsRequest {
  string parent_id = 1;
  string level = 2;
  string status = 3;
  string keyword = 4;
  int32 page_size = 5;
  string page_token = 6;
}

message ListAdministrativeUnitsResponse {
  repeated AdministrativeUnit units = 1;
  string next_page_token = 2;
}

message ListAdministrativeUnitTreeResponse {
  repeated AdministrativeUnitNode nodes = 1;
}

message ListWardsRequest {
  string province_id = 1;
  string status = 2;
  string keyword = 3;
  int32 page_size = 4;
  string page_token = 5;
}

message GetAdministrativeUnitRequest { string id = 1; }
message CreateAdministrativeUnitRequest { AdministrativeUnit unit = 1; }
message UpdateAdministrativeUnitRequest {
  string id = 1;
  AdministrativeUnit unit = 2;
}
message DeleteAdministrativeUnitRequest { string id = 1; }

message ListAreaTypesRequest {
  string status = 1;
  string keyword = 2;
  int32 page_size = 3;
  string page_token = 4;
}
message ListAreaTypesResponse {
  repeated AreaType area_types = 1;
  string next_page_token = 2;
}
message GetAreaTypeRequest { string id = 1; }
message CreateAreaTypeRequest { AreaType area_type = 1; }
message UpdateAreaTypeRequest {
  string id = 1;
  AreaType area_type = 2;
}
message DeleteAreaTypeRequest { string id = 1; }

message ListAreasRequest {
  string area_type_id = 1;
  string parent_id = 2;
  string status = 3;
  string keyword = 4;
  int32 page_size = 5;
  string page_token = 6;
}
message ListAreasResponse {
  repeated Area areas = 1;
  string next_page_token = 2;
}
message ListAreaTreeResponse {
  repeated AreaNode nodes = 1;
}
message GetAreaRequest { string id = 1; }
message CreateAreaRequest { Area area = 1; }
message UpdateAreaRequest {
  string id = 1;
  Area area = 2;
}
message DeleteAreaRequest { string id = 1; }
message AssignAreaAdministrativeUnitRequest {
  string area_id = 1;
  string administrative_unit_id = 2;
  string scope_type = 3;
}
message ListAreaAdministrativeUnitsRequest {
  string area_id = 1;
}
message ListAreaAdministrativeUnitsResponse {
  repeated AreaAdministrativeUnit items = 1;
}
message RemoveAreaAdministrativeUnitRequest {
  string area_id = 1;
  string administrative_unit_id = 2;
}

message ListCodeSetsRequest {
  string status = 1;
  string keyword = 2;
  int32 page_size = 3;
  string page_token = 4;
}
message ListCodeSetsResponse {
  repeated CodeSet code_sets = 1;
  string next_page_token = 2;
}
message GetCodeSetRequest { string id = 1; }
message CreateCodeSetRequest { CodeSet code_set = 1; }
message UpdateCodeSetRequest {
  string id = 1;
  CodeSet code_set = 2;
}
message DeleteCodeSetRequest { string id = 1; }

message ListCodeItemsRequest {
  string code_set_code = 1;
  string status = 2;
  string keyword = 3;
  int32 page_size = 4;
  string page_token = 5;
}
message ListCodeItemsResponse {
  repeated CodeItem code_items = 1;
  string next_page_token = 2;
}
message GetCodeItemRequest { string id = 1; }
message CreateCodeItemRequest {
  string code_set_code = 1;
  CodeItem code_item = 2;
}
message UpdateCodeItemRequest {
  string id = 1;
  CodeItem code_item = 2;
}
message DeleteCodeItemRequest { string id = 1; }

message ListSystemParametersRequest {
  string group_code = 1;
  string status = 2;
  string keyword = 3;
  int32 page_size = 4;
  string page_token = 5;
}
message ListSystemParametersResponse {
  repeated SystemParameter parameters = 1;
  string next_page_token = 2;
}
message GetSystemParameterRequest { string key = 1; }
message CreateSystemParameterRequest { SystemParameter parameter = 1; }
message UpdateSystemParameterRequest {
  string key = 1;
  SystemParameter parameter = 2;
}
message DeleteSystemParameterRequest { string key = 1; }

message ListCreditInstitutionsRequest {
  string status = 1;
  string keyword = 2;
  int32 page_size = 3;
  string page_token = 4;
}
message ListCreditInstitutionsResponse {
  repeated CreditInstitution credit_institutions = 1;
  string next_page_token = 2;
}
message GetCreditInstitutionRequest { string id = 1; }
message CreateCreditInstitutionRequest { CreditInstitution credit_institution = 1; }
message UpdateCreditInstitutionRequest {
  string id = 1;
  CreditInstitution credit_institution = 2;
}
message DeleteCreditInstitutionRequest { string id = 1; }
