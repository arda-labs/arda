syntax = "proto3";

package notification.v1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/arda-labs/arda/arda-be-go/services/notification-service/api/notification/v1;v1";

service NotificationService {
  rpc ListTemplates(ListTemplatesRequest) returns (ListTemplatesResponse) {
    option (google.api.http) = { get: "/v1/notifications/templates" };
  }
  rpc GetTemplate(GetTemplateRequest) returns (NotificationTemplate) {
    option (google.api.http) = { get: "/v1/notifications/templates/{id}" };
  }
  rpc CreateTemplate(CreateTemplateRequest) returns (NotificationTemplate) {
    option (google.api.http) = { post: "/v1/notifications/templates" body: "*" };
  }
  rpc UpdateTemplate(UpdateTemplateRequest) returns (NotificationTemplate) {
    option (google.api.http) = { put: "/v1/notifications/templates/{id}" body: "*" };
  }
  rpc DeleteTemplate(DeleteTemplateRequest) returns (DeleteResponse) {
    option (google.api.http) = { delete: "/v1/notifications/templates/{id}" };
  }

  rpc ListTemplateVersions(ListTemplateVersionsRequest) returns (ListTemplateVersionsResponse) {
    option (google.api.http) = { get: "/v1/notifications/templates/{template_id}/versions" };
  }
  rpc CreateTemplateVersion(CreateTemplateVersionRequest) returns (NotificationTemplateVersion) {
    option (google.api.http) = { post: "/v1/notifications/templates/{template_id}/versions" body: "*" };
  }
  rpc ApproveTemplateVersion(ApproveTemplateVersionRequest) returns (NotificationTemplateVersion) {
    option (google.api.http) = { post: "/v1/notifications/template-versions/{id}/approve" body: "*" };
  }

  rpc CreateNotificationRequest(CreateNotificationRequestRequest) returns (NotificationRequest) {
    option (google.api.http) = { post: "/v1/notifications/requests" body: "*" };
  }
  rpc GetNotificationRequest(GetNotificationRequestRequest) returns (NotificationRequest) {
    option (google.api.http) = { get: "/v1/notifications/requests/{id}" };
  }
  rpc ListDeliveries(ListDeliveriesRequest) returns (ListDeliveriesResponse) {
    option (google.api.http) = { get: "/v1/notifications/deliveries" };
  }
  rpc RetryDelivery(RetryDeliveryRequest) returns (NotificationDelivery) {
    option (google.api.http) = { post: "/v1/notifications/deliveries/{id}/retry" body: "*" };
  }
  rpc RunDeliveryWorkerOnce(RunDeliveryWorkerOnceRequest) returns (RunDeliveryWorkerOnceResponse) {
    option (google.api.http) = { post: "/v1/notifications/deliveries/run-once" body: "*" };
  }
  rpc ListInAppNotifications(ListInAppNotificationsRequest) returns (ListInAppNotificationsResponse) {
    option (google.api.http) = { get: "/v1/notifications/in-app" };
  }
  rpc MarkInAppNotificationRead(MarkInAppNotificationReadRequest) returns (InAppNotification) {
    option (google.api.http) = { post: "/v1/notifications/in-app/{id}/read" body: "*" };
  }
}

message NotificationTemplate {
  string id = 1;
  string code = 2;
  string name = 3;
  string category = 4;
  string default_channel = 5;
  string description = 6;
  string status = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
}

message NotificationTemplateVersion {
  string id = 1;
  string template_id = 2;
  int32 version = 3;
  string channel = 4;
  string language = 5;
  string subject = 6;
  string body = 7;
  string payload_schema_json = 8;
  string approval_status = 9;
  string approved_by = 10;
  google.protobuf.Timestamp approved_at = 11;
  string change_note = 12;
  string status = 13;
  google.protobuf.Timestamp created_at = 14;
  google.protobuf.Timestamp updated_at = 15;
}

message NotificationRequest {
  string id = 1;
  string source_service = 2;
  string event_type = 3;
  string correlation_id = 4;
  string idempotency_key = 5;
  string template_code = 6;
  string recipient_type = 7;
  string recipient_id = 8;
  string recipient_address = 9;
  repeated string channels = 10;
  string language = 11;
  string payload_json = 12;
  int32 priority = 13;
  string status = 14;
  google.protobuf.Timestamp created_at = 15;
  google.protobuf.Timestamp updated_at = 16;
  repeated NotificationDelivery deliveries = 17;
}

message NotificationDelivery {
  string id = 1;
  string request_id = 2;
  string template_version_id = 3;
  string channel = 4;
  string recipient_type = 5;
  string recipient_id = 6;
  string recipient_address = 7;
  string subject = 8;
  string body = 9;
  string status = 10;
  int32 attempt_count = 11;
  int32 max_attempts = 12;
  google.protobuf.Timestamp next_attempt_at = 13;
  string locked_by = 14;
  google.protobuf.Timestamp locked_at = 15;
  string provider_code = 16;
  string provider_message_id = 17;
  string provider_response_json = 18;
  string error_message = 19;
  int32 priority = 20;
  google.protobuf.Timestamp created_at = 21;
  google.protobuf.Timestamp updated_at = 22;
}

message InAppNotification {
  string id = 1;
  string delivery_id = 2;
  string recipient_type = 3;
  string recipient_id = 4;
  string title = 5;
  string body = 6;
  string data_json = 7;
  string status = 8;
  google.protobuf.Timestamp read_at = 9;
  google.protobuf.Timestamp created_at = 10;
}

message DeleteResponse {}

message ListTemplatesRequest {
  string status = 1;
  string keyword = 2;
  int32 page_size = 3;
  string page_token = 4;
}
message ListTemplatesResponse {
  repeated NotificationTemplate templates = 1;
  string next_page_token = 2;
}
message GetTemplateRequest { string id = 1; }
message CreateTemplateRequest { NotificationTemplate template = 1; }
message UpdateTemplateRequest {
  string id = 1;
  NotificationTemplate template = 2;
}
message DeleteTemplateRequest { string id = 1; }

message ListTemplateVersionsRequest {
  string template_id = 1;
  string channel = 2;
  string language = 3;
  string status = 4;
}
message ListTemplateVersionsResponse {
  repeated NotificationTemplateVersion versions = 1;
}
message CreateTemplateVersionRequest {
  string template_id = 1;
  NotificationTemplateVersion version = 2;
}
message ApproveTemplateVersionRequest {
  string id = 1;
  string actor = 2;
  string note = 3;
}

message CreateNotificationRequestRequest {
  NotificationRequest request = 1;
}
message GetNotificationRequestRequest { string id = 1; }
message ListDeliveriesRequest {
  string status = 1;
  string channel = 2;
  string recipient_id = 3;
  int32 page_size = 4;
  string page_token = 5;
}
message ListDeliveriesResponse {
  repeated NotificationDelivery deliveries = 1;
  string next_page_token = 2;
}
message RetryDeliveryRequest {
  string id = 1;
  string actor = 2;
}
message RunDeliveryWorkerOnceRequest {
  string worker_id = 1;
  int32 batch_size = 2;
}
message RunDeliveryWorkerOnceResponse {
  int32 processed = 1;
  int32 failed = 2;
}
message ListInAppNotificationsRequest {
  string recipient_type = 1;
  string recipient_id = 2;
  string status = 3;
  int32 page_size = 4;
  string page_token = 5;
}
message ListInAppNotificationsResponse {
  repeated InAppNotification notifications = 1;
  string next_page_token = 2;
}
message MarkInAppNotificationReadRequest {
  string id = 1;
  string actor = 2;
}
