spring:
  application:
    name: hrm-service
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://thinkcenter:5432/hrm?options=-c%20timezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:hrm}
    password: ${SPRING_DATASOURCE_PASSWORD:hrm@123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:thinkcenter:9092}

zeebe:
  client:
    broker:
      gateway-address: ${ZEEBE_CLIENT_BROKER_GATEWAY_ADDRESS:127.0.0.1:26500}
    security:
      plaintext: ${ZEEBE_CLIENT_SECURITY_PLAINTEXT:true}

server:
  port: 8011

grpc:
  server:
    port: 9011
