<div class="description-container p-4">
  <p-toast />

  <div class="flex justify-between items-center mb-6">
    <h2 class="text-2xl font-bold">Cấu trúc diễn giải & Lý do mẫu</h2>
    <div class="flex gap-2">
      <p-button label="Lưu thay đổi" icon="pi pi-save" (onClick)="onSave()" />
      <p-button label="Thêm mẫu mới" icon="pi pi-plus" severity="success" (onClick)="addTemplate()" />
    </div>
  </div>

  <p-table [value]="templates()" [paginator]="true" [rows]="10" [tableStyle]="{ 'min-width': '60rem' }">
    <ng-template pTemplate="header">
      <tr>
        <th style="width: 150px">Mã lý do</th>
        <th>Nội dung diễn giải (Mẫu)</th>
        <th style="width: 250px">Phân loại module</th>
        <th style="width: 100px">Thao tác</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-tpl let-i="rowIndex">
      <tr>
        <td>
          <input pInputText [(ngModel)]="tpl.code" class="w-full font-mono text-sm" />
        </td>
        <td>
          <input pInputText [(ngModel)]="tpl.content" class="w-full" placeholder="Nhập nội dung diễn giải..." />
        </td>
        <td>
          <p-select [options]="modules" [(ngModel)]="tpl.module" optionLabel="label" optionValue="value" class="w-full" />
        </td>
        <td class="text-center">
          <p-button icon="pi pi-trash" severity="danger" [text]="true" (onClick)="deleteTemplate(i)" />
        </td>
      </tr>
    </ng-template>
  </p-table>

  <div class="mt-6 p-4 bg-gray-50 border border-gray-200 rounded text-gray-600 text-sm">
    <i class="pi pi-info-circle mr-2"></i>
    Các mẫu diễn giải này sẽ hiển thị trong danh sách gợi ý khi cán bộ xử lý thực hiện các thao tác: Phê duyệt, Từ chối, hoặc Yêu cầu bổ sung.
  </div>
</div>
