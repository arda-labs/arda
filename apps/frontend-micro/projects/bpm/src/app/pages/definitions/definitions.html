<div class="p-4">
  <div class="flex items-center justify-between mb-4">
    <h1 class="text-2xl font-semibold m-0">Danh sách quy trình</h1>
    <p-button label="Triển khai BPMN mới" icon="pi pi-upload" severity="success" (onClick)="goToDeploy()" />
  </div>

  <!-- Toolbar -->
  <div class="flex gap-3 mb-4 flex-wrap align-items-center">
    <p-iconfield>
      <i class="pi pi-search" pIconField="icon"></i>
      <input pInputText pInputIconField="icon" placeholder="Tìm kiếm..." [ngModel]="keyword()" (ngModelChange)="keyword.set($event); onSearch()" />
    </p-iconfield>
    <p-select [options]="moduleOptions" [(ngModel)]="selectedModule" (onChange)="onSearch()" styleClass="w-44" />
    <div class="flex items-center gap-2">
      <p-inputSwitch inputId="incInactive" [(ngModel)]="includeInactive" (onChange)="onSearch()" />
      <label for="incInactive" class="text-sm text-muted-color">Bao gồm không hoạt động</label>
    </div>
  </div>

  <!-- Table -->
  @defer {
    <p-table
      [value]="table.items()"
      [lazy]="true"
      (onLazyLoad)="table.loadPage($event)"
      [totalRecords]="table.totalRecords()"
      [rows]="table.pageSize()"
      [loading]="table.resource.isLoading()"
      [paginator]="true"
      [rowsPerPageOptions]="table.rowsPerPageOptions"
      dataKey="id"
    >
      <ng-template #header>
        <tr>
          <th pSortableColumn="name" style="min-width:200px">Tên quy trình <p-sortIcon field="name" /></th>
          <th pSortableColumn="processKey" style="min-width:140px">Process Key <p-sortIcon field="processKey" /></th>
          <th pSortableColumn="version" style="width:100px">Phiên bản <p-sortIcon field="version" /></th>
          <th pSortableColumn="category" style="width:120px">Danh mục <p-sortIcon field="category" /></th>
          <th pSortableColumn="module" style="width:100px">Module <p-sortIcon field="module" /></th>
          <th pSortableColumn="isActive" style="width:100px">Trạng thái</th>
          <th pSortableColumn="createdAt" style="width:160px">Ngày tạo <p-sortIcon field="createdAt" /></th>
          <th style="width:100px">Thao tác</th>
        </tr>
      </ng-template>
      <ng-template #body let-def>
        <tr>
          <td>{{ def.name }}</td>
          <td><code class="text-sm bg-gray-100 dark:bg-gray-800 px-2 py-1 rounded">{{ def.processKey }}</code></td>
          <td><p-tag [value]="'v' + def.version" [severity]="getVersionSeverity(def.version)" /></td>
          <td>{{ def.category || '-' }}</td>
          <td><p-tag [value]="def.module" severity="info" /></td>
          <td><p-tag [value]="def.isActive ? 'Hoạt động' : 'Ngừng'" [severity]="def.isActive ? 'success' : 'secondary'" /></td>
          <td>{{ def.createdAt | date:'dd/MM/yyyy HH:mm' }}</td>
          <td>
            <p-button icon="pi pi-eye" severity="info" pTooltip="Xem sơ đồ" (onClick)="viewDiagram(def)" />
          </td>
        </tr>
      </ng-template>
      <ng-template #emptymessage>
        <tr>
          <td colspan="8" class="text-center text-muted-color py-6">Chưa có quy trình nào được triển khai</td>
        </tr>
      </ng-template>
    </p-table>
  } @placeholder {
    <p-skeleton height="300px" />
  }
</div>
