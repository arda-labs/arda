<div class="outbound-container p-4">
  <div class="flex justify-between items-center mb-6">
    <h2 class="text-3xl font-bold">Giao dịch đi (Outbound Tasks)</h2>
    <p-iconfield>
      <p-inputicon class="pi pi-search" />
      <input pInputText [(ngModel)]="searchQuery" placeholder="Tìm kiếm giao dịch đã gửi..." class="w-72" />
    </p-iconfield>
  </div>

  <p-table [value]="tasks()" [tableStyle]="{ 'min-width': '70rem' }" class="custom-table">
    <ng-template pTemplate="header">
      <tr>
        <th style="width: 120px">Mã Task</th>
        <th>Tiêu đề giao dịch</th>
        <th>Đang xử lý tại</th>
        <th style="width: 150px">Trạng thái</th>
        <th style="width: 180px">Thời gian gửi</th>
        <th style="width: 120px">Thời gian xử lý</th>
        <th style="width: 120px">Thao tác</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-task>
      <tr>
        <td class="font-mono">{{ task.id }}</td>
        <td><span class="font-medium">{{ task.title }}</span></td>
        <td>
          <div class="flex items-center gap-2">
            <i class="pi pi-directions text-blue-500"></i>
            <span>{{ task.target }}</span>
          </div>
        </td>
        <td>
          <p-tag [value]="task.status" [severity]="getStatusSeverity(task.status)" />
        </td>
        <td class="text-sm text-gray-600">{{ task.startTime }}</td>
        <td class="text-sm font-bold">{{ task.duration }}</td>
        <td>
          <div class="flex gap-2">
            <p-button icon="pi pi-history" [text]="true" rounded pTooltip="Xem tiến độ" />
            <p-button
              *ngIf="task.status === 'IN_PROGRESS'"
              icon="pi pi-undo"
              severity="warn"
              [text]="true"
              rounded
              pTooltip="Thu hồi (Recall)"
              (onClick)="onRecall(task)" />
          </div>
        </td>
      </tr>
    </ng-template>
  </p-table>

  <div class="mt-6 flex gap-4">
    <div class="p-4 bg-blue-50 border border-blue-100 rounded-lg flex-1">
      <h4 class="font-bold text-blue-800 mb-1">Giao dịch đang xử lý</h4>
      <span class="text-2xl font-black text-blue-600">12</span>
    </div>
    <div class="p-4 bg-green-50 border border-green-100 rounded-lg flex-1">
      <h4 class="font-bold text-green-800 mb-1">Giao dịch đã hoàn thành</h4>
      <span class="text-2xl font-black text-green-600">450</span>
    </div>
    <div class="p-4 bg-orange-50 border border-orange-100 rounded-lg flex-1">
      <h4 class="font-bold text-orange-800 mb-1">Giao dịch bị trả lại</h4>
      <span class="text-2xl font-black text-orange-600">3</span>
    </div>
  </div>
</div>
