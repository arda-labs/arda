<div class="attachments-container p-4">
  <p-toast />
  <div class="mb-6">
    <h3 class="text-xl font-bold mb-4">Hồ sơ đính kèm</h3>
    <p-fileupload
      mode="basic"
      name="file"
      [customUpload]="true"
      (uploadHandler)="onUpload($event)"
      [auto]="true"
      chooseLabel="Chọn tệp tải lên"
      accept="image/*,application/pdf"
      maxFileSize="10000000"
      class="w-full" />
  </div>

  <p-table [value]="files()" [tableStyle]="{ 'min-width': '50rem' }" class="custom-table">
    <ng-template pTemplate="header">
      <tr>
        <th>Tên file</th>
        <th>Loại tài liệu</th>
        <th>Dung lượng</th>
        <th>Ngày tải lên</th>
        <th>Trạng thái</th>
        <th>Thao tác</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-file>
      <tr>
        <td>
          <i class="pi" [class.pi-file-pdf]="file.name.endsWith('.pdf')" [class.text-red-500]="file.name.endsWith('.pdf')" [class.pi-image]="!file.name.endsWith('.pdf')" [class.text-blue-500]="!file.name.endsWith('.pdf')"></i>
          <span class="ml-2 font-medium">{{ file.name }}</span>
        </td>
        <td>{{ file.type }}</td>
        <td>{{ file.size }}</td>
        <td class="text-sm">{{ file.uploadDate }}</td>
        <td>
          <p-tag [value]="file.status" [severity]="getSeverity(file.status)" />
        </td>
        <td>
          <div class="flex gap-2">
            <p-button icon="pi pi-eye" [text]="true" rounded pTooltip="Xem tệp" (onClick)="onView(file)" />
            <p-button icon="pi pi-trash" [text]="true" severity="danger" rounded pTooltip="Xóa" />
          </div>
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
