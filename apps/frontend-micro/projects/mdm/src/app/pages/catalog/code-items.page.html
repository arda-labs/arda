<p-toast />
<p-confirmDialog />

<section class="space-y-4 p-4">
  <div class="flex flex-col gap-3 xl:flex-row xl:items-center xl:justify-between">
    <div>
      <div class="text-xs font-semibold uppercase tracking-normal text-primary">Danh mục & tham số</div>
      <h1 class="text-2xl font-semibold text-surface-900 dark:text-white">Giá trị danh mục</h1>
      <p class="text-sm text-surface-500">{{ selectedCodeSetName() || selectedCodeSetCode() || 'Chưa chọn bộ danh mục' }}</p>
    </div>
    <div class="flex flex-col gap-2 sm:flex-row sm:items-center">
      <p-select [options]="codeSetOptions()" [ngModel]="selectedCodeSetCode()" (ngModelChange)="selectCodeSet($event)" optionLabel="label" optionValue="value" placeholder="Chọn danh mục" class="w-full sm:w-80" />
      <p-button icon="pi pi-refresh" severity="secondary" label="Làm mới" (onClick)="reload()" />
      <p-button icon="pi pi-plus" label="Thêm item" (onClick)="open()" />
    </div>
  </div>

  <div class="overflow-hidden rounded-lg border border-surface-200 bg-surface-0 dark:border-surface-800 dark:bg-surface-900">
    <p-table [value]="codeItems()" [loading]="codeItemsResource.isLoading()" [rows]="15" [paginator]="true" class="p-datatable-sm" responsiveLayout="scroll">
      <ng-template pTemplate="header">
        <tr>
          <th>Mã</th>
          <th>Tên</th>
          <th>Giá trị</th>
          <th>Flags</th>
          <th>Trạng thái</th>
          <th class="text-right">Hành động</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-item>
        <tr>
          <td><span class="font-mono text-xs">{{ item.code }}</span></td>
          <td><span class="font-semibold">{{ item.name }}</span></td>
          <td><span class="text-sm">{{ item.value }}</span></td>
          <td>
            <div class="flex gap-1">
              @if (item.isDefault) { <p-tag value="Default" severity="success" class="text-[10px]" /> }
              @if (item.isSystem) { <p-tag value="System" severity="info" class="text-[10px]" /> }
            </div>
          </td>
          <td><p-tag [value]="item.status" [severity]="statusSeverity(item.status)" class="text-[10px]" /></td>
          <td class="text-right">
            <p-button icon="pi pi-pencil" size="small" variant="text" pTooltip="Sửa" (onClick)="open(item)" />
            <p-button icon="pi pi-trash" severity="danger" size="small" variant="text" pTooltip="Xóa" (onClick)="delete(item)" />
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr><td colspan="6" class="p-8 text-center text-surface-500">Chọn danh mục để xem item.</td></tr>
      </ng-template>
    </p-table>
  </div>
</section>

<p-dialog [visible]="dialogVisible()" (visibleChange)="dialogVisible.set($event)" [modal]="true" [draggable]="false" [resizable]="false" [style]="{width: '720px'}" [header]="selected() ? 'Cập nhật item' : 'Thêm item'">
  <div [formGroup]="form" class="grid grid-cols-1 gap-4 py-4 md:grid-cols-2">
    <input pInputText formControlName="code" placeholder="Mã item" />
    <input pInputText formControlName="name" placeholder="Tên item" />
    <input pInputText formControlName="value" placeholder="Giá trị" />
    <input pInputText type="number" formControlName="sortOrder" placeholder="Thứ tự" />
    <input pInputText formControlName="color" placeholder="Màu" />
    <input pInputText formControlName="icon" placeholder="Icon" />
    <p-select formControlName="status" [options]="statusOptions" optionLabel="label" optionValue="value" appendTo="body" />
    <div class="flex items-center gap-4">
      <label class="flex items-center gap-2"><input type="checkbox" formControlName="isDefault" class="h-4 w-4 accent-primary" />Default</label>
      <label class="flex items-center gap-2"><input type="checkbox" formControlName="isSystem" class="h-4 w-4 accent-primary" />System</label>
    </div>
    <input pInputText type="date" formControlName="effectiveFrom" />
    <input pInputText type="date" formControlName="effectiveTo" />
    <textarea pTextarea formControlName="metadataJson" rows="3" class="md:col-span-2" placeholder="Metadata JSON"></textarea>
  </div>
  <ng-template pTemplate="footer">
    <p-button label="Hủy" severity="secondary" variant="text" (onClick)="dialogVisible.set(false)" />
    <p-button label="Lưu" icon="pi pi-check" [loading]="isSaving()" (onClick)="save()" />
  </ng-template>
</p-dialog>
