<p-toast />
<p-confirmDialog />

<section class="space-y-4 p-4">
  <div class="flex flex-col gap-2 md:flex-row md:items-center md:justify-between">
    <div>
      <div class="text-xs font-semibold uppercase tracking-normal text-primary">Danh mục & tham số</div>
      <h1 class="text-2xl font-semibold text-surface-900 dark:text-white">Bộ danh mục</h1>
      <p class="text-sm text-surface-500">Nhóm danh mục dùng chung cho toàn hệ thống.</p>
    </div>
    <div class="flex gap-2">
      <p-button icon="pi pi-refresh" severity="secondary" label="Làm mới" (onClick)="reload()" />
      <p-button icon="pi pi-plus" label="Thêm danh mục" (onClick)="open()" />
    </div>
  </div>

  <div class="overflow-hidden rounded-lg border border-surface-200 bg-surface-0 dark:border-surface-800 dark:bg-surface-900">
    <p-table [value]="codeSets()" [loading]="resource.isLoading()" [rows]="15" [paginator]="true" class="p-datatable-sm" responsiveLayout="scroll">
      <ng-template pTemplate="header">
        <tr>
          <th>Mã</th>
          <th>Tên danh mục</th>
          <th>Mô tả</th>
          <th>System</th>
          <th>Trạng thái</th>
          <th class="text-right">Hành động</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-set>
        <tr>
          <td><span class="font-mono text-xs">{{ set.code }}</span></td>
          <td><button type="button" class="font-semibold text-primary hover:underline" (click)="openItems(set)">{{ set.name }}</button></td>
          <td><span class="text-sm text-surface-500">{{ set.description }}</span></td>
          <td><p-tag [value]="set.isSystem ? 'System' : 'Custom'" [severity]="set.isSystem ? 'info' : 'secondary'" class="text-[10px]" /></td>
          <td><p-tag [value]="set.status" [severity]="statusSeverity(set.status)" class="text-[10px]" /></td>
          <td class="text-right">
            <p-button icon="pi pi-pencil" size="small" variant="text" pTooltip="Sửa" (onClick)="open(set)" />
            <p-button icon="pi pi-trash" severity="danger" size="small" variant="text" pTooltip="Xóa" (onClick)="delete(set)" />
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr><td colspan="6" class="p-8 text-center text-surface-500">Chưa có danh mục.</td></tr>
      </ng-template>
    </p-table>
  </div>
</section>

<p-dialog [visible]="dialogVisible()" (visibleChange)="dialogVisible.set($event)" [modal]="true" [draggable]="false" [resizable]="false" [style]="{width: '640px'}" [header]="selected() ? 'Cập nhật danh mục' : 'Thêm danh mục'">
  <div [formGroup]="form" class="grid grid-cols-1 gap-4 py-4 md:grid-cols-2">
    <div class="flex flex-col gap-2">
      <label for="codeSetCode" class="text-sm font-medium">Mã danh mục</label>
      <input pInputText id="codeSetCode" formControlName="code" placeholder="Mã danh mục" />
    </div>
    <div class="flex flex-col gap-2">
      <label for="codeSetName" class="text-sm font-medium">Tên danh mục</label>
      <input pInputText id="codeSetName" formControlName="name" placeholder="Tên danh mục" />
    </div>
    <div class="flex flex-col gap-2">
      <label for="codeSetStatus" class="text-sm font-medium">Trạng thái</label>
      <p-select inputId="codeSetStatus" formControlName="status" [options]="statusOptions" optionLabel="label" optionValue="value" appendTo="body" />
    </div>
    <label class="flex items-center gap-3 rounded-md border border-surface-200 px-3 dark:border-surface-700">
      <input type="checkbox" formControlName="isSystem" class="h-4 w-4 accent-primary" />
      <span>System</span>
    </label>
    <div class="flex flex-col gap-2 md:col-span-2">
      <label for="codeSetDescription" class="text-sm font-medium">Mô tả</label>
      <textarea pTextarea id="codeSetDescription" formControlName="description" rows="3" placeholder="Mô tả"></textarea>
    </div>
  </div>
  <ng-template pTemplate="footer">
    <p-button label="Hủy" severity="secondary" variant="text" (onClick)="dialogVisible.set(false)" />
    <p-button label="Lưu" icon="pi pi-check" [loading]="isSaving()" (onClick)="save()" />
  </ng-template>
</p-dialog>
