<p-toast />
<p-confirmDialog />

<section class="space-y-4 p-4">
  <div class="flex flex-col gap-2 md:flex-row md:items-center md:justify-between">
    <div>
      <div class="text-xs font-semibold uppercase tracking-normal text-primary">Địa lý hành chính</div>
      <h1 class="text-2xl font-semibold text-surface-900 dark:text-white">Loại khu vực</h1>
      <p class="text-sm text-surface-500">Phân loại vùng kinh doanh, vận hành, pháp lý hoặc thu hồi nợ.</p>
    </div>
    <div class="flex gap-2">
      <p-button icon="pi pi-refresh" severity="secondary" label="Làm mới" (onClick)="reload()" />
      <p-button icon="pi pi-plus" label="Thêm loại" (onClick)="open()" />
    </div>
  </div>

  <div class="overflow-hidden rounded-lg border border-surface-200 bg-surface-0 dark:border-surface-800 dark:bg-surface-900">
    <p-table [value]="areaTypes()" [loading]="resource.isLoading()" [rows]="15" [paginator]="true" class="p-datatable-sm" responsiveLayout="scroll">
      <ng-template pTemplate="header">
        <tr>
          <th>Mã</th>
          <th>Tên loại</th>
          <th>Mô tả</th>
          <th>Phân cấp</th>
          <th>Trạng thái</th>
          <th class="text-right">Hành động</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-type>
        <tr>
          <td><span class="font-mono text-xs">{{ type.code }}</span></td>
          <td><span class="font-semibold">{{ type.name }}</span></td>
          <td><span class="text-sm text-surface-500">{{ type.description }}</span></td>
          <td><p-tag [value]="type.allowHierarchy ? 'Có' : 'Không'" [severity]="type.allowHierarchy ? 'success' : 'secondary'" class="text-[10px]" /></td>
          <td><p-tag [value]="type.status" [severity]="statusSeverity(type.status)" class="text-[10px]" /></td>
          <td class="text-right">
            <p-button icon="pi pi-pencil" size="small" variant="text" pTooltip="Sửa" (onClick)="open(type)" />
            <p-button icon="pi pi-trash" severity="danger" size="small" variant="text" pTooltip="Xóa" (onClick)="delete(type)" />
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr><td colspan="6" class="p-8 text-center text-surface-500">Chưa có loại khu vực.</td></tr>
      </ng-template>
    </p-table>
  </div>
</section>

<p-dialog [visible]="dialogVisible()" (visibleChange)="dialogVisible.set($event)" [modal]="true" [draggable]="false" [resizable]="false" [style]="{width: '640px'}" [header]="selected() ? 'Cập nhật loại khu vực' : 'Thêm loại khu vực'">
  <div [formGroup]="form" class="grid grid-cols-1 gap-4 py-4 md:grid-cols-2">
    <div class="flex flex-col gap-2">
      <label for="areaTypeCode" class="text-sm font-medium">Mã loại</label>
      <input pInputText id="areaTypeCode" formControlName="code" placeholder="Mã loại" />
    </div>
    <div class="flex flex-col gap-2">
      <label for="areaTypeName" class="text-sm font-medium">Tên loại</label>
      <input pInputText id="areaTypeName" formControlName="name" placeholder="Tên loại" />
    </div>
    <div class="flex flex-col gap-2">
      <label for="areaTypeStatus" class="text-sm font-medium">Trạng thái</label>
      <p-select inputId="areaTypeStatus" formControlName="status" [options]="statusOptions" optionLabel="label" optionValue="value" appendTo="body" />
    </div>
    <label class="flex items-center gap-3 rounded-md border border-surface-200 px-3 dark:border-surface-700">
      <input type="checkbox" formControlName="allowHierarchy" class="h-4 w-4 accent-primary" />
      <span>Cho phép phân cấp</span>
    </label>
    <div class="flex flex-col gap-2 md:col-span-2">
      <label for="areaTypeDescription" class="text-sm font-medium">Mô tả</label>
      <textarea pTextarea id="areaTypeDescription" formControlName="description" rows="3" placeholder="Mô tả"></textarea>
    </div>
  </div>
  <ng-template pTemplate="footer">
    <p-button label="Hủy" severity="secondary" variant="text" (onClick)="dialogVisible.set(false)" />
    <p-button label="Lưu" icon="pi pi-check" [loading]="isSaving()" (onClick)="save()" />
  </ng-template>
</p-dialog>
