<header
  class="h-16 grid grid-cols-[minmax(0,1fr)_auto] items-center gap-4 px-5 bg-surface-0/90 dark:bg-surface-900/90 backdrop-blur-md border-b border-surface-200 dark:border-surface-800 shrink-0 z-10">
  <div class="flex min-w-0 items-center gap-3">
    <!-- Re-open sidebar button (Visible ONLY when sidebar closed) -->
    @if (!sidebarVisible()) {
    <p-button icon="pi pi-bars" [variant]="'text'" [rounded]="true" severity="secondary" (onClick)="onToggleSidebar()"
      styleClass="mr-2" aria-label="Open sidebar" />
    }

    <p-breadcrumb
      [home]="breadcrumbHome"
      [model]="breadcrumbItems()"
      styleClass="app-header-breadcrumb hidden md:flex min-w-0 !border-0 !bg-transparent !p-0"
    />
  </div>

  <div class="flex min-w-0 items-center justify-end gap-2">
    <div class="hidden items-center gap-2 rounded-md border border-surface-200 bg-surface-50 px-3 py-1.5 font-mono text-[11px] font-semibold tabular-nums text-surface-600 dark:border-surface-800 dark:bg-surface-950 dark:text-surface-300 md:flex">
      <span class="h-1.5 w-1.5 rounded-full bg-emerald-500"></span>
      <span>{{ marketClock() }}</span>
    </div>

    <div class="hidden h-6 w-px bg-surface-200 dark:bg-surface-800 md:block"></div>

    <p-button
      [icon]="themeSettings().darkMode ? 'pi pi-sun' : 'pi pi-moon'"
      [variant]="'text'"
      [rounded]="true"
      severity="secondary"
      [pTooltip]="themeSettings().darkMode ? 'Light mode' : 'Dark mode'"
      tooltipPosition="bottom"
      aria-label="Toggle dark mode"
      (onClick)="toggleDarkMode()"
    />
    <p-button icon="pi pi-bell" [variant]="'text'" [rounded]="true" severity="secondary" pTooltip="In-box"
      tooltipPosition="bottom" aria-label="Notifications" />

    <div class="hidden h-6 w-px bg-surface-200 dark:bg-surface-800 md:block"></div>

    <div class="hidden md:block">
      <button
        type="button"
        class="flex h-9 w-9 cursor-pointer items-center justify-center rounded-full border border-transparent bg-transparent text-base transition-colors hover:border-surface-200 hover:bg-surface-100 dark:hover:border-surface-800 dark:hover:bg-surface-800"
        aria-label="Chọn ngôn ngữ"
        (click)="languageMenu.toggle($event)"
      >
        {{ currentFlag() }}
      </button>
      <p-menu #languageMenu [model]="languageMenuItems" [popup]="true" appendTo="body" />
    </div>

    <div class="flex items-center gap-2">
      <p-avatar [label]="userInitials()" shape="circle" class="bg-primary-500 text-white font-bold cursor-pointer"
        (click)="userMenu.toggle($event)" />
      <p-menu #userMenu [model]="userMenuItems" [popup]="true" appendTo="body" />
    </div>
  </div>
</header>
