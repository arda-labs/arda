<div class="flex w-full items-center gap-1.5 rounded-md border border-surface-200 bg-surface-0 px-2 py-1 dark:border-surface-800 dark:bg-surface-950">

  @if (isLoading()) {
  <i class="pi pi-spin pi-spinner text-xs text-surface-400"></i>
  }

  @if (tenants().length > 1) {
  <label for="tenantSwitcher" class="sr-only">Đơn vị hiện tại</label>
  <p-select inputId="tenantSwitcher" [options]="tenants()" [ngModel]="selectedId()" optionLabel="name" optionValue="id"
    (onChange)="onTenantChange($event)" styleClass="tenant-switcher-select w-full !bg-transparent !border-none !shadow-none !text-xs !font-medium">
    <ng-template pTemplate="selectedItem" let-opt>
      <div class="flex min-w-0 items-center gap-2 text-surface-700 dark:text-surface-200">
        <i class="pi pi-building text-[10px] text-primary-500"></i>
        <span class="truncate">{{ opt.name }}</span>
      </div>
    </ng-template>

    <ng-template pTemplate="item" let-opt>
      <div class="flex items-center gap-2 text-sm">
        <i class="pi pi-building text-xs"></i>
        <span>{{ opt.name }}</span>
      </div>
    </ng-template>
  </p-select>

  } @else if (tenants().length === 1) {
  <div class="flex min-w-0 items-center gap-1.5 px-1 py-0.5 text-xs font-medium text-surface-700 dark:text-surface-200">
    <i class="pi pi-building text-[10px] text-primary-500"></i>
    <span class="truncate">{{ tenants()[0].name }}</span>
  </div>
  }

</div>
