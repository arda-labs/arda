<div class="flex items-center">

  @if (isLoading()) {
    <i class="pi pi-spin pi-spinner text-xs text-surface-400"></i>
  }

  @if (tenants().length > 1) {
    <p-select
      [options]="tenants()"
      [ngModel]="selectedId()"
      optionLabel="name"
      optionValue="id"
      (onChange)="onTenantChange($event)"
      styleClass="!bg-transparent !border-none !shadow-none !text-xs !font-medium"
    >
      <ng-template pTemplate="selectedItem" let-opt>
        <div class="flex items-center gap-1.5 text-surface-700 dark:text-surface-200">
          <i class="pi pi-building text-[10px]"></i>
          <span class="truncate max-w-28">{{ opt.name }}</span>
        </div>
      </ng-template>

      <ng-template pTemplate="item" let-opt>
        <div class="flex items-center gap-2 text-sm">
          <i class="pi pi-building text-xs"></i>
          <span>{{ opt.name }}</span>
        </div>
      </ng-template>
    </p-select>

  } @else if (tenants().length === 1) {
    <div class="flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium text-surface-600 dark:text-surface-400">
      <i class="pi pi-building text-[10px]"></i>
      <span class="truncate max-w-28">{{ tenants()[0].name }}</span>
    </div>
  }

</div>
