name: CI/CD

on:
  push:
    branches: [main]
  pull_request:

permissions:
  actions: read
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/arda-labs

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      git_sha: ${{ steps.sha.outputs.short }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod   # đọc version từ go.mod, không hardcode
          cache: true

      - name: Verify dependencies
        run: go mod verify

      - name: Build
        run: make build

      - name: Test
        run: go test ./... -count=1 -race -timeout 120s

      - id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

  docker:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # cần cho git describe trong Dockerfile

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/iam-service
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [build, docker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout arda-infra
        uses: actions/checkout@v4
        with:
          repository: arda-labs/arda-infra
          token: ${{ secrets.INFRA_REPO_PAT }}
          ref: main

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Update iam-service image tag
        run: |
          cd apps/iam-service/overlays/dev
          kustomize edit set image \
            ghcr.io/arda-labs/iam-service=ghcr.io/arda-labs/iam-service:${{ needs.build.outputs.git_sha }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/iam-service/overlays/dev/kustomization.yaml
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore(iam-service): update image to ${{ needs.build.outputs.git_sha }}"
          git push
