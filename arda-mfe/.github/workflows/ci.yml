name: CI/CD

on:
  push:
    branches: [main]
  pull_request:

permissions:
  actions: read
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/arda-labs

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      git_sha: ${{ steps.sha.outputs.short }}
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npx nx run-many -t lint test build
      - run: npx nx fix-ci
        if: always()

      - id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

  docker:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [shell, common]
        include:
          - app: shell
            target: shell-runtime
            mf_common_url: https://arda.io.vn/common/mf-manifest.json
          - app: common
            target: common-runtime
            mf_common_url: ''
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/mfe-${{ matrix.app }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: ${{ matrix.target }}
          build-args: |
            APP=${{ matrix.app }}
            MF_COMMON_URL=${{ matrix.mf_common_url }}
            GIT_SHA=${{ needs.build.outputs.git_sha }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [build, docker]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout arda-infra
        uses: actions/checkout@v4
        with:
          repository: arda-labs/arda-infra
          token: ${{ secrets.INFRA_REPO_PAT }}
          ref: main

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Update shell image tag
        run: |
          cd apps/mfe-shell/overlays/dev
          kustomize edit set image ghcr.io/arda-labs/mfe-shell=ghcr.io/arda-labs/mfe-shell:${{ needs.build.outputs.git_sha }}

      - name: Update common image tag
        run: |
          cd apps/mfe-common/overlays/dev
          kustomize edit set image ghcr.io/arda-labs/mfe-common=ghcr.io/arda-labs/mfe-common:${{ needs.build.outputs.git_sha }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/mfe-shell/overlays/dev/kustomization.yaml apps/mfe-common/overlays/dev/kustomization.yaml
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore(mfe): update images to ${{ needs.build.outputs.git_sha }}"
          git push
